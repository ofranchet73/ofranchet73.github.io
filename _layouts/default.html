<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
    </div>
    <div class="header-nav">
      <nav class="site-nav">
        <input type="checkbox" id="nav-toggle" class="nav-toggle">
        <label for="nav-toggle" class="nav-burger">
          <span></span><span></span><span></span>
        </label>
        <div class="nav-links">
          {% for page in site.header_pages %}
            {% assign node = site.pages | where: "path", page | first %}
            <a href="{{ node.url | relative_url }}" class="nav-link">
              {{ node.title }}
            </a>
          {% endfor %}
        </div>
      </nav>
    </div>
  </header>

  <main class="page-content">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <p class="footer-name">{{ site.title }}</p>
      <p class="footer-desc">Cybersécurité & Facteur humain — Former, sensibiliser, protéger</p>
      <p class="footer-copy">© {{ 'now' | date: "%Y" }} Odile Franchet</p>
    </div>
  </footer>

</body>
</html>
